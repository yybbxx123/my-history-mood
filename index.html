<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI心理测评 × 古代人物匹配</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(120deg, #f3f7ff, #eefbf6);
      color: #1f2937;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px; }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-top: 16px;
    }
    h1, h2 { margin-top: 0; }
    .muted { color: #6b7280; }
    .question { margin-bottom: 18px; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fafafa;
    }
    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }
    .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    button {
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary { background: #4b5563; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .hidden { display: none; }
    .badge {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .chat-box {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
      min-height: 220px;
      max-height: 360px;
      overflow: auto;
      padding: 12px;
    }
    .chat-item { margin-bottom: 10px; line-height: 1.6; }
    .chat-item b { color: #111827; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AI心理测评 × 古代人物匹配系统</h1>
    <p class="muted">单文件离线版：复制这个网页到任意电脑，双击即可在浏览器打开。</p>

    <section id="home" class="card">
      <h2>首页</h2>
      <p>完成 10 道题，系统会根据你的选择匹配最接近的古代人物，并给出故事化解读。</p>
      <button id="startBtn">开始测评</button>
    </section>

    <section id="quiz" class="card hidden">
      <h2>问卷页</h2>
      <div id="quizContainer"></div>
      <div class="row">
        <button class="secondary" id="backHomeBtn">返回首页</button>
        <button id="submitBtn">提交并生成结果</button>
      </div>
    </section>

    <section id="result" class="card hidden">
      <h2>结果页</h2>
      <p><b>性格总结：</b><span id="summaryText"></span></p>
      <p><b>核心特质：</b><span id="traitsText"></span></p>
      <p><b>匹配人物：</b><span id="figureText"></span></p>
      <p><b>匹配原因：</b><span id="reasonText"></span></p>
      <p><b>故事化解读：</b><span id="storyText"></span></p>
      <div class="row">
        <button class="secondary" id="retryBtn">重新测评</button>
        <button id="toChatBtn">与人物对话</button>
      </div>
    </section>

    <section id="chat" class="card hidden">
      <h2>聊天页（离线模拟）</h2>
      <div id="chatBox" class="chat-box"></div>
      <div class="row">
        <input id="chatInput" type="text" placeholder="输入你想问的话..." />
        <button id="sendBtn">发送</button>
      </div>
      <div class="row">
        <button class="secondary" id="backResultBtn">返回结果页</button>
      </div>
    </section>
  </div>

  <script>
    const questions = [
      { id: "q1", type: "single", question: "面对压力时，你通常会？", options: ["先冷静分析", "找人倾诉", "立刻行动", "暂时回避"] },
      { id: "q2", type: "single", question: "团队合作中你更常扮演？", options: ["组织者", "执行者", "协调者", "创意者"] },
      { id: "q3", type: "single", question: "你做决定时更依赖？", options: ["数据和逻辑", "直觉和经验", "他人建议", "随机应变"] },
      { id: "q4", type: "single", question: "遇到长期目标时你会？", options: ["做详细计划", "边做边调整", "先做短期尝试", "看情况再说"] },
      { id: "q5", type: "single", question: "在冲突场景中你更倾向？", options: ["理性沟通", "坚持原则", "顾全关系", "先退一步"] },
      { id: "q6", type: "single", question: "你更喜欢哪类任务？", options: ["策略规划", "快速执行", "创意表达", "支持协助"] },
      { id: "q7", type: "single", question: "面对不确定性时你会？", options: ["收集信息", "直接尝试", "等更明确后再做", "请教他人"] },
      { id: "q8", type: "single", question: "你希望别人如何评价你？", options: ["可靠稳重", "聪明高效", "温暖体贴", "有趣独特"] },
      { id: "q9", type: "single", question: "如果失败了你通常会？", options: ["复盘总结", "快速重来", "寻求支持", "换个方向"] },
      { id: "q10", type: "text", question: "请简述一段让你最有成就感的经历。" }
    ];

    const figures = [
      {
        name: "诸葛亮", era: "三国",
        tags: ["理性", "规划", "责任感"],
        reason: "你在压力下偏向分析与规划，重视系统性与长期目标。",
        story: "你像三国时期的诸葛亮，善于在复杂局面中梳理关键路径。你的优势在于冷静和全局观，能在混乱中保持秩序感。面对挑战时，你更愿意先推演后行动，这种稳健让你在团队中成为可靠中枢。"
      },
      {
        name: "王阳明", era: "明代",
        tags: ["反思", "行动力", "自我觉察"],
        reason: "你兼具内省与行动，重视价值一致性，常在实践中修正自己。",
        story: "你像明代的王阳明，能把思考转化为实践。你不满足于纸上谈兵，而是在行动中验证想法。遇到问题时，你会回到内心原则，再快速调整路径。你的成长方式是“边做边悟”，韧性很强。"
      },
      {
        name: "李白", era: "唐代",
        tags: ["创造力", "感性", "表达力"],
        reason: "你更看重灵感与表达，面对问题时具有非线性思维。",
        story: "你像唐代的李白，天生带有想象力和表达欲。你擅长把情绪和灵感转化为作品或想法，也愿意探索不被定义的可能。你的优势是开阔视角和感染力，在创新型任务中常能提出让人眼前一亮的解法。"
      },
      {
        name: "韩信", era: "汉代",
        tags: ["执行力", "应变", "目标导向"],
        reason: "你更重视结果与执行，善于在变化中迅速调整策略。",
        story: "你像汉代名将韩信，擅长把目标拆解为可落地动作。你在复杂环境中适应快、决断强，能在压力下推进任务。你的核心竞争力是效率与策略并重，既能抓住机会，也能快速纠偏。"
      },
      {
        name: "苏轼", era: "宋代",
        tags: ["乐观", "包容", "平衡感"],
        reason: "你在理性与感性之间平衡得较好，面对变化有较强情绪弹性。",
        story: "你像宋代的苏轼，拥有现实能力与精神弹性的双重优势。你遇到挫折时不轻易被击垮，反而能用更开阔的心态重新组织生活与目标。你的特点是稳中有温度，既能做事，也能安顿自己。"
      }
    ];

    const answers = {};
    let matched = null;
    let chatHistory = [];

    const home = document.getElementById("home");
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");
    const chat = document.getElementById("chat");

    function show(section) {
      [home, quiz, result, chat].forEach(el => el.classList.add("hidden"));
      section.classList.remove("hidden");
    }

    function renderQuiz() {
      const box = document.getElementById("quizContainer");
      box.innerHTML = "";
      questions.forEach(q => {
        const div = document.createElement("div");
        div.className = "question";
        const title = document.createElement("p");
        title.textContent = q.question;
        div.appendChild(title);

        if (q.type === "single") {
          const opts = document.createElement("div");
          opts.className = "options";
          q.options.forEach(opt => {
            const label = document.createElement("label");
            const input = document.createElement("input");
            input.type = "radio";
            input.name = q.id;
            input.value = opt;
            input.onchange = () => answers[q.id] = opt;
            label.appendChild(input);
            label.appendChild(document.createTextNode(opt));
            opts.appendChild(label);
          });
          div.appendChild(opts);
        } else {
          const ta = document.createElement("textarea");
          ta.rows = 4;
          ta.placeholder = "请输入你的经历...";
          ta.oninput = e => answers[q.id] = e.target.value;
          div.appendChild(ta);
        }
        box.appendChild(div);
      });
    }

    function scoreFigure() {
      const text = JSON.stringify(answers, null, 2);
      const t = (text || "").toLowerCase();
      let idx = 0;
      if (t.includes("分析") || t.includes("计划") || t.includes("逻辑")) idx = 0;
      else if (t.includes("反思") || t.includes("原则") || t.includes("实践")) idx = 1;
      else if (t.includes("创意") || t.includes("表达") || t.includes("灵感")) idx = 2;
      else if (t.includes("执行") || t.includes("行动") || t.includes("目标")) idx = 3;
      else idx = 4;
      return figures[idx];
    }

    function renderResult() {
      matched = scoreFigure();
      const summary = `你整体呈现出“${matched.tags.join(" + ")}”的倾向，做事有自己的节奏与风格。`;
      document.getElementById("summaryText").textContent = summary;
      document.getElementById("traitsText").innerHTML = matched.tags.map(t => `<span class="badge">${t}</span>`).join("");
      document.getElementById("figureText").textContent = `${matched.name}（${matched.era}）`;
      document.getElementById("reasonText").textContent = matched.reason;
      document.getElementById("storyText").textContent = matched.story;
    }

    function addChat(role, text) {
      const box = document.getElementById("chatBox");
      const item = document.createElement("div");
      item.className = "chat-item";
      item.innerHTML = `<b>${role === "user" ? "你" : matched.name}：</b>${text}`;
      box.appendChild(item);
      box.scrollTop = box.scrollHeight;
    }

    function replyByFigure(message) {
      const map = {
        "诸葛亮": "观你所问，当先明其势，再定其策。心若定，则局自开；一步一步推进，胜于急进。",
        "王阳明": "此事不必先求万全，先做一小步，在行动中校正方向。知行并进，便能见真功夫。",
        "李白": "人生快意在于敢想敢为。你先把心中所愿写下来，再挑一件今日就能做的小事，意气自生。",
        "韩信": "目标已定，就拆成三步：先拿到第一成果，再扩大战果，最后稳固复盘。讲效率，也讲节奏。",
        "苏轼": "不妨把眼前难题看作一段路。行到水穷处，坐看云起时，心宽一寸，路便宽一丈。"
      };
      if (!message.trim()) return "你可再说得具体些，我愿细听。";
      return map[matched.name] || "我已听见你的困惑，我们一起慢慢理清。";
    }

    document.getElementById("startBtn").onclick = () => {
      renderQuiz();
      show(quiz);
    };
    document.getElementById("backHomeBtn").onclick = () => show(home);
    document.getElementById("submitBtn").onclick = () => {
      renderResult();
      show(result);
    };
    document.getElementById("retryBtn").onclick = () => {
      Object.keys(answers).forEach(k => delete answers[k]);
      chatHistory = [];
      document.getElementById("chatBox").innerHTML = "";
      renderQuiz();
      show(quiz);
    };
    document.getElementById("toChatBtn").onclick = () => {
      show(chat);
      if (document.getElementById("chatBox").innerHTML.trim() === "") {
        addChat("assistant", `吾乃${matched.name}。你可说说最近最困扰你的事，我来与你共析。`);
      }
    };
    document.getElementById("backResultBtn").onclick = () => show(result);
    document.getElementById("sendBtn").onclick = () => {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;
      chatHistory.push({ role: "user", text });
      addChat("user", text);
      const reply = replyByFigure(text);
      chatHistory.push({ role: "assistant", text: reply });
      setTimeout(() => addChat("assistant", reply), 300);
      input.value = "";
    };
  </script>
</body>
</html>
